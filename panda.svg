<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="180" height="198">

  <!-- === EARS === -->
  <circle cx="62" cy="52" r="22" fill="#1a1a1a"/>
  <circle cx="138" cy="52" r="22" fill="#1a1a1a"/>
  <!-- Ear inner -->
  <circle cx="62" cy="52" r="13" fill="#2e2e2e"/>
  <circle cx="138" cy="52" r="13" fill="#2e2e2e"/>

  <!-- === HEAD === -->
  <circle cx="100" cy="95" r="60" fill="white"/>
  <!-- Head subtle shadow bottom -->
  <ellipse cx="100" cy="150" rx="44" ry="8" fill="#e0e0e0" opacity="0.5"/>

  <!-- === EYE PATCHES (oval, tilted like plush panda) === -->
  <ellipse cx="78" cy="88" rx="18" ry="14" fill="#1a1a1a" transform="rotate(-15 78 88)"/>
  <ellipse cx="122" cy="88" rx="18" ry="14" fill="#1a1a1a" transform="rotate(15 122 88)"/>

  <!-- === EYES (whites inside patches) === -->
  <circle cx="78" cy="87" r="8" fill="white"/>
  <circle cx="122" cy="87" r="8" fill="white"/>

  <!-- === PUPILS === -->
  <circle cx="79" cy="88" r="5" fill="#1a1a1a"/>
  <circle cx="123" cy="88" r="5" fill="#1a1a1a"/>

  <!-- === EYE SHINE === -->
  <circle cx="81" cy="85.5" r="2" fill="white"/>
  <circle cx="125" cy="85.5" r="2" fill="white"/>

  <!-- === NOSE === -->
  <ellipse cx="100" cy="103" rx="6" ry="4" fill="#1a1a1a"/>

  <!-- === MOUTH (happy) === -->
  <path d="M 90 111 Q 100 120 110 111" stroke="#1a1a1a" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- === BLUSH CHEEKS === -->
  <ellipse cx="68" cy="107" rx="10" ry="6" fill="#ffb3c6" opacity="0.55"/>
  <ellipse cx="132" cy="107" rx="10" ry="6" fill="#ffb3c6" opacity="0.55"/>

  <!-- === BODY (small and compact, plush style) === -->
  <ellipse cx="100" cy="178" rx="38" ry="32" fill="#1a1a1a"/>
  <!-- Belly -->
  <ellipse cx="100" cy="180" rx="22" ry="20" fill="white"/>

  <!-- === LEFT ARM (static, resting) === -->
  <ellipse cx="64" cy="170" rx="10" ry="16" fill="#1a1a1a" transform="rotate(20 64 170)"/>

  <!-- === RIGHT ARM (waving) === -->
  <g>
    <animateTransform
      attributeName="transform"
      type="rotate"
      values="-20 138 155; 25 138 155; -20 138 155"
      dur="1s"
      repeatCount="indefinite"
      calcMode="ease-in-out"
    />
    <ellipse cx="140" cy="158" rx="10" ry="16" fill="#1a1a1a" transform="rotate(-20 140 158)"/>
  </g>

  <!-- === FEET === -->
  <ellipse cx="80" cy="205" rx="16" ry="10" fill="#1a1a1a"/>
  <ellipse cx="120" cy="205" rx="16" ry="10" fill="#1a1a1a"/>

  <!-- === TOE LINES === -->
  <line x1="72" y1="208" x2="72" y2="204" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="80" y1="210" x2="80" y2="206" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="88" y1="208" x2="88" y2="204" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="112" y1="208" x2="112" y2="204" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="120" y1="210" x2="120" y2="206" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="128" y1="208" x2="128" y2="204" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>

</svg>
